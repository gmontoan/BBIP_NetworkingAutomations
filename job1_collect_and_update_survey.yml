---
- name: job1_collect_and_update_survey
  hosts: all
  gather_facts: false
  
  vars:
    collected_interfaces_data: []
    # --- CONFIGURACOES DA API DO CONTROLLER ---
    controller_api_url: "https://10.7.144.170/api/v2" 
    job_template_name_to_update: "job2_apply_interface_config"
    # [SECOPS] O token (controller_auth_token) e injetado pelo AAP via Custom Credential.

  tasks:
    # ---------------------------------------------------------
    # BLOCO 0: PRE-FLIGHT CHECK (Validacao de Conectividade)
    # ---------------------------------------------------------
    - name: "Check: Validar se a porta SSH esta aberta"
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        timeout: 10
      delegate_to: localhost
      ignore_errors: yes
      register: connectivity_check

    # ---------------------------------------------------------
    # BLOCO 1: COLETA NO CISCO IOS XR
    # ---------------------------------------------------------
    - name: Coletar Fatos de Interfaces (Cisco IOS XR)
      cisco.iosxr.iosxr_interfaces:
        state: gathered
      register: xr_interfaces
      when: ansible_network_os == 'cisco.iosxr.iosxr'

    - name: Parse de Dados (Cisco IOS XR)
      ansible.builtin.set_fact:
        collected_interfaces_data: "{{ collected_interfaces_data + [ item.name + ' (MTU Atual: ' + (item.mtu | string) + ')' ] }}"
      loop: "{{ xr_interfaces.gathered | default([]) }}"
      when: 
        - ansible_network_os == 'cisco.iosxr.iosxr'
        - item.mtu is defined

    # ---------------------------------------------------------
    # BLOCO 2: COLETA NO HUAWEI NE5000E
    # ---------------------------------------------------------
    - name: Coletar Fatos de Interfaces e Parsear com TextFSM (Huawei NE)
      ansible.utils.cli_parse:
        command: "display interface"
        parser:
          name: ansible.utils.textfsm
          os: huawei_vrp
      register: ne_interfaces_parsed
      when: ansible_network_os == 'huaweidatacom.ne.ne'

    - name: Parse de Dados Reais (Huawei NE)
      ansible.builtin.set_fact:
        collected_interfaces_data: "{{ collected_interfaces_data + [ item.INTERFACE + ' (MTU Atual: ' + (item.MTU | string) + ')' ] }}"
      loop: "{{ ne_interfaces_parsed.parsed | default([]) }}"
      when: 
        - ansible_network_os == 'huaweidatacom.ne.ne'
        - item.INTERFACE is defined
        - item.MTU is defined

    # ---------------------------------------------------------
    # BLOCO 3: ATUALIZACAO DINAMICA DO SURVEY (AAP API NATIVA)
    # ---------------------------------------------------------
    - name: "Sincronizacao com o Controller (Atualizar Job 2)"
      block:
        - name: "Tratamento de Dados: Agrupar e Filtrar Interfaces"
          ansible.builtin.set_fact:
            all_interfaces_choices: >-
              {{
                ansible_play_hosts | 
                map('extract', hostvars, 'collected_interfaces_data') | 
                flatten | select('defined') | unique |
                select('match', '(?i)^(Gi|Te|Hu|Eth|Po|ge-|xe-|et-|xge|XG).*') | 
                reject('search', '(?i)Vlan|Loop|Null|mgmt|Management|irb|Standard|Virtual|Sub|Local|lo0|dsc|tap|fxp|Tunnel') | 
                list | sort
              }}

        - name: Garantir que temos interfaces coletadas
          ansible.builtin.assert:
            that:
              - all_interfaces_choices | length > 0
            fail_msg: "Nenhuma interface foi coletada. O Survey nao pode ser atualizado vazio."

        - name: Debug - Verificar interfaces que serao injetadas
          ansible.builtin.debug:
            msg: "Lista de interfaces capturadas para o Survey: {{ all_interfaces_choices }}"

        - name: "API: Localizar ID do Job Template"
          ansible.builtin.uri:
            url: "{{ controller_api_url }}/job_templates/?name={{ job_template_name_to_update | urlencode }}"
            method: GET
            headers:
              Authorization: "Bearer {{ controller_auth_token }}"
            validate_certs: false
          register: jt_search

        - name: "API: Atualizar Survey Spec (Forcar o JSON)"
          ansible.builtin.uri:
            url: "{{ controller_api_url }}/job_templates/{{ jt_search.json.results[0].id }}/survey_spec/"
            method: POST
            body_format: json
            headers:
              Authorization: "Bearer {{ controller_auth_token }}"
            validate_certs: false
            body:
              name: "Survey de Provisionamento de Interface"
              description: "Selecione a interface e defina os parametros de rede L2 e L3."
              spec:
                - question_name: "Selecione a Interface Alvo:"
                  question_description: "Lista gerada dinamicamente a partir do Job 1."
                  variable: "target_interface_selection"
                  type: "multiplechoice"
                  choices: "{{ all_interfaces_choices | join('\n') }}"
                  required: true
                - question_name: "Novo MTU (Sugestao Padrao: 9216):"
                  question_description: "Insira o valor de MTU para Jumbo Frames."
                  variable: "target_mtu"
                  type: "integer"
                  default: 9216
                  required: true
                - question_name: "Endereco IPv4 / CIDR (ex: 10.100.1.1/30):"
                  question_description: "Defina o endereco IP e a mascara."
                  variable: "target_ipv4_cidr"
                  type: "text"
                  required: true
            status_code: [200, 201]
          when: jt_search.json.count > 0

        - name: "API: Garantir que o Survey esta Ativo (Habilitado)"
          ansible.builtin.uri:
            url: "{{ controller_api_url }}/job_templates/{{ jt_search.json.results[0].id }}/"
            method: PATCH
            body_format: json
            headers:
              Authorization: "Bearer {{ controller_auth_token }}"
            validate_certs: false
            body:
              survey_enabled: true
            status_code: [200, 201]
          when: jt_search.json.count > 0

      # A magia que resolve o problema do "Limit" acontece nestas duas linhas:
      delegate_to: localhost
      run_once: true
