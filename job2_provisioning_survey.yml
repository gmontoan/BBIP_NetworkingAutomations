---
- name: "JOB 2: Provisioning Multi-Vendor de Interface"
  hosts: all
  gather_facts: no

  tasks:
    # -------------------------------------------------------------------------
    # 0. VALIDAÇÃO DE VARIÁVEIS DO SURVEY
    # -------------------------------------------------------------------------
    - name: "Validar presença das variáveis do Survey"
      ansible.builtin.assert:
        that:
          - survey_interface is defined
          - survey_ip_cidr is defined
        fail_msg: "ERRO: As variáveis do Survey não foram recebidas. Certifique-se de preencher o formulário no AAP."

    # -------------------------------------------------------------------------
    # 1. CONFIGURAÇÃO - CISCO IOS (Suporte via Paramiko para SSH Legado)
    # -------------------------------------------------------------------------
    - name: "Cisco: Aplicar Configuração de Interface L3"
      cisco.ios.ios_l3_interfaces:
        config:
          - name: "{{ survey_interface }}"
            ipv4:
              - address: "{{ survey_ip_cidr }}"
      vars:
        # Mudança para Paramiko: Mais compatível com KEX antigos e evitamos o erro de 'invalid value ssh'
        ansible_network_cli_ssh_type: paramiko
        ansible_ssh_common_args: >-
          -o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1,diffie-hellman-group1-sha1
          -o HostKeyAlgorithms=+ssh-rsa
      when: ansible_network_os in ['ios', 'cisco.ios.ios']

    - name: "Cisco: Ativar Interface e Descrição"
      cisco.ios.ios_interfaces:
        config:
          - name: "{{ survey_interface }}"
            description: "Configurado via AAP - Job 2 ({{ now(fmt='%Y-%m-%d') }})"
            enabled: true
      vars:
        ansible_network_cli_ssh_type: paramiko
        ansible_ssh_common_args: >-
          -o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1,diffie-hellman-group1-sha1
          -o HostKeyAlgorithms=+ssh-rsa
      when: ansible_network_os in ['ios', 'cisco.ios.ios']

    # -------------------------------------------------------------------------
    # 2. CONFIGURAÇÃO - ARISTA EOS
    # -------------------------------------------------------------------------
    - name: "Arista: Aplicar Configuração de Interface L3"
      arista.eos.eos_l3_interfaces:
        config:
          - name: "{{ survey_interface }}"
            ipv4:
              - address: "{{ survey_ip_cidr }}"
      when: ansible_network_os in ['eos', 'arista.eos.eos']

    - name: "Arista: Ativar Interface e Descrição"
      arista.eos.eos_interfaces:
        config:
          - name: "{{ survey_interface }}"
            description: "Configurado via AAP - Job 2 ({{ now(fmt='%Y-%m-%d') }})"
            enabled: true
      when: ansible_network_os in ['eos', 'arista.eos.eos']

    # -------------------------------------------------------------------------
    # 3. CONFIGURAÇÃO - JUNIPER JUNOS (cRPD)
    # -------------------------------------------------------------------------
    - name: "Juniper: Aplicar Configuração via junos_config (Estável)"
      junipernetworks.junos.junos_config:
        update: merge
        lines:
          - "delete interfaces {{ survey_interface }} disable"
          - "set interfaces {{ survey_interface }} description \"Configurado por AAP Job 2\""
          - "set interfaces {{ survey_interface }} unit 0 family inet address {{ survey_ip_cidr }}"
      vars:
        ansible_connection: ansible.netcommon.netconf
        ansible_port: 830
      when: ansible_network_os in ['junos', 'junipernetworks.junos.junos', 'juniper.device.junos']

    # -------------------------------------------------------------------------
    # 4. RESULTADO FINAL
    # -------------------------------------------------------------------------
    - name: "Resultado do Provisioning"
      ansible.builtin.debug:
        msg: 
          - "Sucesso: {{ inventory_hostname }} configurado."
          - "Fabricante: {{ ansible_network_os }}"
          - "Interface: {{ survey_interface }}"
          - "Endereço: {{ survey_ip_cidr }}"
