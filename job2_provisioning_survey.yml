---
- name: "JOB 2: Provisioning Multi-Vendor de Interface (Versão Estável)"
  hosts: all
  gather_facts: no

  tasks:
    # -------------------------------------------------------------------------
    # 0. VALIDAÇÃO DE VARIÁVEIS DO SURVEY
    # -------------------------------------------------------------------------
    - name: "Validar presença das variáveis do Survey"
      ansible.builtin.assert:
        that:
          - survey_interface is defined
          - survey_ip_cidr is defined
        fail_msg: "ERRO: As variáveis 'survey_interface' ou 'survey_ip_cidr' não foram recebidas corretamente."

    # -------------------------------------------------------------------------
    # 1. CONFIGURAÇÃO - CISCO IOS
    # -------------------------------------------------------------------------
    - name: "Cisco: Aplicar Configuração"
      cisco.ios.ios_l3_interfaces:
        config:
          - name: "{{ survey_interface }}"
            ipv4:
              - address: "{{ survey_ip_cidr }}"
      when: ansible_network_os in ['ios', 'cisco.ios.ios']

    # -------------------------------------------------------------------------
    # 2. CONFIGURAÇÃO - ARISTA EOS
    # -------------------------------------------------------------------------
    - name: "Arista: Aplicar Configuração"
      arista.eos.eos_l3_interfaces:
        config:
          - name: "{{ survey_interface }}"
            ipv4:
              - address: "{{ survey_ip_cidr }}"
      when: ansible_network_os in ['eos', 'arista.eos.eos']

    # -------------------------------------------------------------------------
    # 3. CONFIGURAÇÃO - JUNIPER JUNOS (cRPD) - CORREÇÃO SYNTAX ERROR
    # -------------------------------------------------------------------------
    - name: "Juniper: Aplicar Configuração via junos_config (Estável)"
      junipernetworks.junos.junos_config:
        update: merge
        lines:
          - "delete interfaces {{ survey_interface }} disable"
          - "set interfaces {{ survey_interface }} description \"Configurado por AAP Job 2\""
          - "set interfaces {{ survey_interface }} unit 0 family inet address {{ survey_ip_cidr }}"
      vars:
        ansible_connection: ansible.netcommon.netconf
        ansible_port: 830
      when: ansible_network_os in ['junos', 'junipernetworks.junos.junos', 'juniper.device.junos']

    # -------------------------------------------------------------------------
    # 4. RESULTADO
    # -------------------------------------------------------------------------
    - name: "Resultado Final"
      ansible.builtin.debug:
        msg: "Provisioning concluído com sucesso para {{ inventory_hostname }} na interface {{ survey_interface }}."
