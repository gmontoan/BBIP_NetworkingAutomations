---
- name: Job 2 - Provisionamento Completo de Interface (MTU, IP e Descricao)
  hosts: all
  gather_facts: false
  
  tasks:
    # ---------------------------------------------------------
    # TRATAMENTO DE VARIÁVEIS DO SURVEY E AUTO-GERAÇÃO
    # ---------------------------------------------------------
    - name: Parse de Variaveis do Survey (Interface, IP, Mascara e Descricao)
      ansible.builtin.set_fact:
        # Limpa a string da interface que veio do Survey
        clean_interface_name: "{{ target_interface_selection | regex_replace(' \\(MTU Atual:.*\\)', '') }}"
        
        # Separa o IP da Mascara baseado na barra (/) do CIDR
        target_ip: "{{ target_ipv4_cidr.split('/')[0] }}"
        target_mask: "{{ target_ipv4_cidr.split('/')[1] }}"
        
        # Gera uma descricao automatica padronizada para auditoria
        auto_description: "Provisionado via Ansible AAP - IP: {{ target_ipv4_cidr }}"

    - name: Exibir intencao de configuracao
      ansible.builtin.debug:
        msg: "Configurando {{ clean_interface_name }} | Desc: {{ auto_description }} | MTU: {{ target_mtu }} | IP: {{ target_ip }}/{{ target_mask }} no host {{ inventory_hostname }}"

    # ---------------------------------------------------------
    # APLICACAO: CISCO IOS XR
    # ---------------------------------------------------------
    - name: Configurar L2 e Descricao (Cisco IOS XR)
      cisco.iosxr.iosxr_interfaces:
        config:
          - name: "{{ clean_interface_name }}"
            description: "{{ auto_description }}"
            mtu: "{{ target_mtu }}"
            enabled: true  # Traduzido pelo Ansible para "no shutdown" e commita automaticamente
        state: merged
      when: ansible_network_os == 'cisco.iosxr.iosxr'

    - name: Configurar L3/IPv4 (Cisco IOS XR)
      cisco.iosxr.iosxr_l3_interfaces:
        config:
          - name: "{{ clean_interface_name }}"
            ipv4:
              - address: "{{ target_ipv4_cidr }}"
        state: merged
      when: ansible_network_os == 'cisco.iosxr.iosxr'

    # ---------------------------------------------------------
    # APLICACAO: HUAWEI NE5000E
    # ---------------------------------------------------------
    - name: Configurar L2, L3 e Descricao (Huawei NE)
      huaweidatacom.ne.ne_config:
        lines:
          - "description {{ auto_description }}"
          - "mtu {{ target_mtu }}"
          - "ip address {{ target_ip }} {{ target_mask }}"
          - "undo shutdown"  # Garante que a interface suba (Administratively UP)
        parents: "interface {{ clean_interface_name }}"
      when: ansible_network_os == 'huaweidatacom.ne.ne'
      register: ne_config_result

    - name: Salvar configuracao (Huawei NE)
      huaweidatacom.ne.ne_command:
        commands: "save"
        prompt:
          - "Are you sure to continue"
        answer:
          - "Y"
      when: 
        - ansible_network_os == 'huaweidatacom.ne.ne'
        - ne_config_result.changed
