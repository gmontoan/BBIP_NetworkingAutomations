---
- name: "JOB 1: Discovery Focado (Host Único) e Mutação de Survey"
  # O AAP vai restringir isto através do "Limit" (Prompt on launch)
  hosts: all
  gather_facts: no
  
  vars:
    # =====================================================================
    # CREDENCIAIS E URL DA API DO AAP
    # =====================================================================
    # O IP foi atualizado exatamente para o que você usa no browser!
    api_url: "https://192.168.15.200"
    api_user: "admin"
    api_pass: "redhat"

  tasks:
    # =========================================================================
    # 0. TRAVA DE SEGURANÇA
    # =========================================================================
    - name: "Garantir que o Job 1 corre apenas num único Host"
      ansible.builtin.fail:
        msg: "ERRO: Este Job deve correr apenas num equipamento. Por favor, defina um único host no campo 'Limit' ao lançar o Job."
      when: ansible_play_hosts | length > 1
      run_once: yes

    # =========================================================================
    # 1. RECOLHA DE FACTS DE INTERFACES (SCRAPING)
    # =========================================================================
    - name: "Cisco: Coletar Interfaces L3/L2"
      cisco.ios.ios_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['ios', 'cisco.ios.ios']

    - name: "Arista: Coletar Interfaces L3/L2"
      arista.eos.eos_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['eos', 'arista.eos.eos']

    - name: "Juniper: Coletar Interfaces L3/L2"
      juniper.device.junos_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['junos', 'junipernetworks.junos.junos']

    # =========================================================================
    # 2. FILTRAGEM E TRATAMENTO DOS DADOS NO ANSIBLE
    # =========================================================================
    - name: "Extrair apenas interfaces físicas para o dropdown"
      ansible.builtin.set_fact:
        host_interfaces: >-
          {% set result = [] %}
          {% for intf in ansible_net_interfaces.keys() %}
          {%   if not intf | regex_search('Loopback|Null|Vlan|irb|mgmt|Management') %}
          {%     set _ = result.append(intf) %}
          {%   endif %}
          {% endfor %}
          {{ result | sort }}
      when: ansible_net_interfaces is defined

    # =========================================================================
    # 3. MUTAÇÃO DO SURVEY (INJEÇÃO VIA API PARA O JOB 2)
    # =========================================================================
    - name: "Atualizar Survey do Job 2 com as interfaces do {{ inventory_hostname }}"
      awx.awx.job_template:
        name: "Provisioning Devices" # NOME ATUALIZADO AQUI
        survey_enabled: yes
        survey_spec:
          name: "Survey Dinamico"
          description: "Interfaces validadas para o equipamento selecionado."
          spec:
            - question_name: "Host Alvo Configurado"
              question_description: "O Job 1 preparou o Survey para este host."
              variable: "survey_target_host"
              type: "text"
              default: "{{ inventory_hostname }}"
              required: true
              
            - question_name: "Selecione a Interface"
              question_description: "Interfaces físicas disponíveis no {{ inventory_hostname }}"
              variable: "survey_interface"
              type: "multiplechoice"
              # Injetamos a lista pura formatada corretamente com quebras de linha
              choices: "{{ host_interfaces | join('\n') }}"
              required: true
              
            - question_name: "Endereço IP e Máscara (CIDR)"
              question_description: "Ex: 10.0.0.1/30"
              variable: "survey_ip_cidr"
              type: "text"
              required: true
              
        # -------------------------------------------------------------
        # CONEXÃO À API (Agora usando a variável fixa diretamente)
        # -------------------------------------------------------------
        controller_host: "{{ api_url }}"
        controller_username: "{{ api_user }}"
        controller_password: "{{ api_pass }}"
        validate_certs: no

      # -------------------------------------------------------------
      # VARIÁVEIS DA TASK
      # -------------------------------------------------------------
      delegate_to: localhost
      run_once: yes
      
      # Bypass de Proxy interno do podman/Kubernetes do AAP
      environment:
        no_proxy: "127.0.0.1,localhost,192.168.15.200"
