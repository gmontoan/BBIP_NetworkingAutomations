---
- name: "JOB 1: Discovery Focado (Host Único) e Mutação de Survey"
  hosts: all
  gather_facts: no

  # -------------------------------------------------------------------------
  # NOTA TÉCNICA (AAP 2.6 - API GATEWAY):
  # Confirmado que o endpoint correto é /api/controller/v2/.
  # Usamos o módulo 'uri' com o Token OAuth2 para ignorar o redirecionamento
  # do Gateway que causava o erro 404 nos módulos padrão.
  # -------------------------------------------------------------------------

  tasks:
    # -------------------------------------------------------------------------
    # 1. SCRAPING DE INTERFACES (Cisco, Arista, Juniper)
    # -------------------------------------------------------------------------
    - name: "Cisco: Coletar Interfaces"
      cisco.ios.ios_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['ios', 'cisco.ios.ios']

    - name: "Arista: Coletar Interfaces"
      arista.eos.eos_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['eos', 'arista.eos.eos']

    - name: "Juniper: Coletar Interfaces"
      juniper.device.junos_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['junos', 'junipernetworks.junos.junos']

    # -------------------------------------------------------------------------
    # 2. TRATAMENTO DE DADOS
    # -------------------------------------------------------------------------
    - name: "Filtrar Interfaces Físicas"
      ansible.builtin.set_fact:
        filtered_interfaces: >-
          {% set list = [] %}
          {% for i in ansible_net_interfaces.keys() %}
          {%   if not i | regex_search('Vlan|Loopback|Null|mgmt|Management|irb') %}
          {%     set _ = list.append(i) %}
          {%   endif %}
          {% endfor %}
          {{ list | sort }}

    # -------------------------------------------------------------------------
    # 3. ATUALIZAÇÃO DO SURVEY (Via API Gateway /api/controller/)
    # -------------------------------------------------------------------------
    
    # Passo A: Descobrir o ID do Job Template pelo Nome usando o Token
    - name: "API: Localizar ID do Job Template 'Provisioning Devices'"
      ansible.builtin.uri:
        url: "https://192.168.15.200/api/controller/v2/job_templates/?name=Provisioning+Devices"
        method: GET
        headers:
          Authorization: "Bearer GFSZRmDUoQhNQijz3jTUp6nURS40uF"
        validate_certs: no
        status_code: 200
      register: jt_lookup
      delegate_to: localhost
      run_once: yes

    # Passo B: Injetar o novo Survey usando o ID encontrado
    - name: "API: Atualizar Survey do Job 2"
      ansible.builtin.uri:
        url: "https://192.168.15.200/api/controller/v2/job_templates/{{ jt_lookup.json.results[0].id }}/survey_spec/"
        method: POST
        body_format: json
        headers:
          Authorization: "Bearer GFSZRmDUoQhNQijz3jTUp6nURS40uF"
        body:
          name: "Provisioning Survey"
          description: "Gerado dinamicamente para o host {{ inventory_hostname }}"
          spec:
            - question_name: "Equipamento Confirmado"
              variable: "survey_target_host"
              type: "text"
              default: "{{ inventory_hostname }}"
              required: true
            - question_name: "Selecione a Interface Física"
              variable: "survey_interface"
              type: "multiplechoice"
              choices: "{{ filtered_interfaces | join('\n') }}"
              required: true
            - question_name: "Configuração IPv4 (CIDR)"
              variable: "survey_ip_cidr"
              type: "text"
              required: true
        validate_certs: no
        status_code: [200, 201]
      delegate_to: localhost
      run_once: yes
      when: jt_lookup.json.count > 0
      
      # Ambiente isolado: no_proxy evita que o contentor tente sair para a internet 
      # para falar com o próprio host 192.168.15.200
      environment:
        no_proxy: "127.0.0.1,localhost,192.168.15.200"
