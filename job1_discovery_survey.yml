---
- name: "JOB 2: Provisioning de Interface no Juniper cRPD"
  hosts: all
  gather_facts: no

  # As variáveis 'survey_interface' e 'survey_ip_cidr' vêm do Survey do Job 1
  tasks:
    # -------------------------------------------------------------------------
    # 1. CONFIGURAÇÃO VIA CLI-SET (Método mais estável para cRPD)
    # -------------------------------------------------------------------------
    - name: "Juniper: Aplicar Configuração de Interface"
      juniper.device.config:
        load: "set"
        lines:
          - "delete interfaces {{ survey_interface }} disable"
          - "set interfaces {{ survey_interface }} description 'Configurado via AAP - Job 2'"
          - "set interfaces {{ survey_interface }} mtu 1500"
          - "set interfaces {{ survey_interface }} unit 0 family inet address {{ survey_ip_cidr }}"
        format: "set"
        # O 'commit' no cRPD é imediato, mas garantimos a persistência
        comment: "Provisioning realizado pelo utilizador ansible"
      vars:
        ansible_connection: ansible.netcommon.netconf
        ansible_port: 830
      register: config_result

    # -------------------------------------------------------------------------
    # 2. VALIDAÇÃO PÓS-CONFIGURAÇÃO
    # -------------------------------------------------------------------------
    - name: "Verificar Estado da Interface"
      ansible.netcommon.netconf_rpc:
        rpc: get-interface-information
        content: |
          <interface-name>{{ survey_interface }}</interface-name>
          <terse/>
        display: xml
      register: check_interface
      vars:
        ansible_connection: ansible.netcommon.netconf
        ansible_port: 830

    - name: "Confirmar IP atribuído"
      ansible.builtin.assert:
        that: "survey_ip_cidr.split('/')[0] in check_interface.output"
        fail_msg: "O endereço IP não foi detetado na interface após o commit."

    - name: "Resultado Final"
      ansible.builtin.debug:
        msg: "Interface {{ survey_interface }} configurada com sucesso em {{ inventory_hostname }}."
