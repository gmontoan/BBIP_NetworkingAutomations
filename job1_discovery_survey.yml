---
- name: "JOB 1: Discovery Robusto e Mutação Dinâmica de Survey"
  hosts: all
  gather_facts: no

  vars:
    # Configurações do Controller
    controller_api_url: "https://192.168.15.200/api/controller/v2"
    target_jt_name: "Provisioning Devices"
    auth_token: "GFSZRmDUoQhNQijz3jTUp6nURS40uF"

  tasks:
    # -------------------------------------------------------------------------
    # 1. VALIDAÇÃO DE CONECTIVIDADE
    # -------------------------------------------------------------------------
    - name: "Check: Validar se a porta de gestão está aberta"
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: "{{ (ansible_network_os is search('junos')) | ternary(830, 22) }}"
        timeout: 10
      register: connectivity_check
      ignore_errors: yes
      delegate_to: localhost

    # -------------------------------------------------------------------------
    # 2. RECOLHA DE DADOS (Scraping Multi-Vendor)
    # -------------------------------------------------------------------------
    - name: "Recolha de Dados de Rede"
      block:
        - name: "Cisco: Recolher Facts via CLI"
          cisco.ios.ios_facts:
            gather_subset: interfaces
          when: ansible_network_os in ['ios', 'cisco.ios.ios']

        - name: "Arista: Recolher Facts via CLI"
          arista.eos.eos_facts:
            gather_subset: interfaces
          when: ansible_network_os in ['eos', 'arista.eos.eos']

        - name: "Juniper (cRPD): Recolher Interfaces via RPC NETCONF"
          ansible.netcommon.netconf_rpc:
            rpc: get-interface-information
            content: "<terse/>"
            display: xml
          register: juniper_rpc_out
          vars:
            ansible_connection: ansible.netcommon.netconf
            ansible_port: 830
          when: ansible_network_os in ['junos', 'junipernetworks.junos.junos', 'juniper.device.junos']

        - name: "Juniper: Normalizar saída via Regex (Método Nativo)"
          ansible.builtin.set_fact:
            # Forçamos a conversão para dicionário para evitar erro de 'AnsibleUnsafeText'
            ansible_net_interfaces: "{{ dict(interface_names | zip([{} ] * (interface_names | length))) }}"
          vars:
            interface_names: "{{ juniper_rpc_out.output | regex_findall('<name>([^<]+)</name>') }}"
          when: 
            - ansible_network_os in ['junos', 'junipernetworks.junos.junos', 'juniper.device.junos']
            - juniper_rpc_out.output is defined

      rescue:
        - name: "Erro: Falha na recolha de facts"
          ansible.builtin.debug:
            msg: "Falha ao processar {{ inventory_hostname }}. Verifique a conectividade NETCONF."

    # -------------------------------------------------------------------------
    # 3. TRATAMENTO E FILTRAGEM
    # -------------------------------------------------------------------------
    - name: "Processar Interfaces"
      block:
        - name: "Filtrar Interfaces Reais"
          ansible.builtin.set_fact:
            interface_list: >-
              {{ 
                ansible_net_interfaces.keys() | 
                select('match', '^(Eth|Gi|Fa|Te|Po|ge-|xe-|et-).*') | 
                reject('search', 'Vlan|Loopback|Null|mgmt|Management|irb|Standard|Virtual|Sub|Local') | 
                list | sort 
              }}

        - name: "Validar Resultado"
          ansible.builtin.assert:
            that: interface_list | length > 0
            fail_msg: "Nenhuma interface física válida encontrada em {{ inventory_hostname }}."

        - name: "Preparar Opções do Survey"
          ansible.builtin.set_fact:
            survey_choices: "{{ interface_list | join('\n') }}"
      when: ansible_net_interfaces is defined

    # -------------------------------------------------------------------------
    # 4. ATUALIZAÇÃO DO CONTROLLER
    # -------------------------------------------------------------------------
    - name: "Sincronização com o Controller"
      block:
        - name: "API: Localizar Job Template"
          ansible.builtin.uri:
            url: "{{ controller_api_url }}/job_templates/?name={{ target_jt_name | urlencode }}"
            method: GET
            headers:
              Authorization: "Bearer {{ auth_token }}"
            validate_certs: no
          register: jt_search
          delegate_to: localhost

        - name: "API: Atualizar Survey Spec"
          ansible.builtin.uri:
            url: "{{ controller_api_url }}/job_templates/{{ jt_search.json.results[0].id }}/survey_spec/"
            method: POST
            body_format: json
            headers:
              Authorization: "Bearer {{ auth_token }}"
            body:
              name: "Provisioning Survey"
              description: "Discovery automático para {{ inventory_hostname }}"
              spec:
                - question_name: "Confirmar Equipamento"
                  variable: "survey_target_host"
                  type: "text"
                  default: "{{ inventory_hostname }}"
                  required: true
                - question_name: "Escolha a Interface Física"
                  variable: "survey_interface"
                  type: "multiplechoice"
                  choices: "{{ survey_choices }}"
                  required: true
                - question_name: "Novo Endereço IP (CIDR)"
                  variable: "survey_ip_cidr"
                  type: "text"
                  required: true
            status_code: [200, 201]
          delegate_to: localhost
          when: jt_search.json.count > 0
      run_once: yes
      when: survey_choices is defined
