---
- name: "JOB 1: Discovery Focado (Host Único) e Mutação de Survey"
  hosts: all
  gather_facts: no
  
  # -------------------------------------------------------------------------
  # NOTA DE CONFIGURAÇÃO:
  # Para este Job funcionar, deve anexar DUAS credenciais no AAP:
  # 1. Credencial de REDE (SSH): Para logar nos routers (Cisco/Arista/Juniper).
  # 2. Credencial de CONTROLLER: Para o Ansible conseguir alterar o Survey via API.
  # -------------------------------------------------------------------------

  tasks:
    # -------------------------------------------------------------------------
    # 1. SCRAPING DE INTERFACES (Login via Credencial de Rede do AAP)
    # -------------------------------------------------------------------------
    - name: "Cisco: Coletar Interfaces"
      cisco.ios.ios_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['ios', 'cisco.ios.ios']

    - name: "Arista: Coletar Interfaces"
      arista.eos.eos_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['eos', 'arista.eos.eos']

    - name: "Juniper: Coletar Interfaces"
      juniper.device.junos_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['junos', 'junipernetworks.junos.junos']

    # -------------------------------------------------------------------------
    # 2. TRATAMENTO DE DADOS
    # -------------------------------------------------------------------------
    - name: "Filtrar Interfaces Físicas"
      ansible.builtin.set_fact:
        filtered_interfaces: >-
          {% set list = [] %}
          {% for i in ansible_net_interfaces.keys() %}
          {%   if not i | regex_search('Vlan|Loopback|Null|mgmt|Management|irb') %}
          {%     set _ = list.append(i) %}
          {%   endif %}
          {% endfor %}
          {{ list | sort }}

    # -------------------------------------------------------------------------
    # 3. ATUALIZAÇÃO DO SURVEY (Login via Credencial de Controller do AAP)
    # -------------------------------------------------------------------------
    - name: "Injetar dados no Job 2 (Provisioning Devices)"
      awx.awx.job_template:
        name: "Provisioning Devices"
        # Usamos lookups de ambiente. O AAP injeta estes dados se a 
        # credencial de "Ansible Controller" estiver anexada ao Job.
        controller_host: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://192.168.15.200', true) }}"
        controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
        controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default('redhat', true) }}"
        validate_certs: no
        survey_enabled: yes
        survey_spec:
          name: "Provisioning Survey"
          spec:
            - question_name: "Equipamento Confirmado"
              variable: "survey_target_host"
              type: "text"
              default: "{{ inventory_hostname }}"
              required: true
            - question_name: "Selecione a Interface Física"
              variable: "survey_interface"
              type: "multiplechoice"
              choices: "{{ filtered_interfaces | join('\n') }}"
              required: true
            - question_name: "Configuração IPv4 (CIDR)"
              variable: "survey_ip_cidr"
              type: "text"
              required: true
      delegate_to: localhost
      run_once: yes
      environment:
        no_proxy: "127.0.0.1,localhost,192.168.15.200"
