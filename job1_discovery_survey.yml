---
- name: "JOB 1: Discovery Focado (Host Único) e Mutação de Survey"
  hosts: all
  gather_facts: no

  # -------------------------------------------------------------------------
  # OBJETIVO: Coletar interfaces de Cisco, Arista ou Juniper via SSH puro
  # e atualizar o Survey de um segundo Job Template no Controller.
  # -------------------------------------------------------------------------

  tasks:
    # -------------------------------------------------------------------------
    # 1. SCRAPING DE INTERFACES (Cisco, Arista, Juniper)
    # -------------------------------------------------------------------------
    - name: "Cisco: Coletar Interfaces"
      cisco.ios.ios_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['ios', 'cisco.ios.ios']

    - name: "Arista: Coletar Interfaces"
      arista.eos.eos_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['eos', 'arista.eos.eos']

    - name: "Juniper: Coletar Interfaces (SSH Puro)"
      # Usando junos_facts para evitar a dependência da biblioteca ncclient
      junipernetworks.junos.junos_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['junos', 'junipernetworks.junos.junos']

    # -------------------------------------------------------------------------
    # 2. TRATAMENTO DE DADOS
    # -------------------------------------------------------------------------
    - name: "Filtrar Interfaces Físicas"
      ansible.builtin.set_fact:
        # Filtra tipos de interface que não queremos no Survey
        interface_list: "{{ ansible_net_interfaces.keys() | reject('search', 'Vlan|Loopback|Null|mgmt|Management|irb|Standard') | list | sort }}"

    - name: "Gerar String para o Survey"
      ansible.builtin.set_fact:
        # Formata a lista para o padrão de múltiplas escolhas do Controller (\n)
        survey_choices_string: "{{ interface_list | join('\n') }}"

    # -------------------------------------------------------------------------
    # 3. ATUALIZAÇÃO DO SURVEY (Via API do Controller)
    # -------------------------------------------------------------------------
    
    - name: "API: Localizar ID do Job Template 'Provisioning Devices'"
      ansible.builtin.uri:
        url: "https://192.168.15.200/api/controller/v2/job_templates/?name=Provisioning+Devices"
        method: GET
        headers:
          Authorization: "Bearer GFSZRmDUoQhNQijz3jTUp6nURS40uF"
        validate_certs: no
        status_code: 200
      register: jt_lookup
      delegate_to: localhost
      run_once: yes

    - name: "API: Atualizar Survey do Job 2"
      ansible.builtin.uri:
        url: "https://192.168.15.200/api/controller/v2/job_templates/{{ jt_lookup.json.results[0].id }}/survey_spec/"
        method: POST
        body_format: json
        headers:
          Authorization: "Bearer GFSZRmDUoQhNQijz3jTUp6nURS40uF"
        body:
          name: "Provisioning Survey"
          description: "Interfaces reais do {{ inventory_hostname }}"
          spec:
            - question_name: "Equipamento Confirmado"
              variable: "survey_target_host"
              type: "text"
              default: "{{ inventory_hostname }}"
              required
