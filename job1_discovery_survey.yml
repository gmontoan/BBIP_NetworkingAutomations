---
- name: Estágio 1 - Discovery Focado e Mutação de Survey AAP
  # Limitamos a execução estritamente ao equipamento alvo definido no Survey 1
  hosts: "{{ target_hostname }}"
  gather_facts: no
  become: yes
  become_method: enable

  tasks:
    # ---------------------------------------------------------
    # 1. COLETAR FACTS ESPECÍFICOS DO ALVO
    # ---------------------------------------------------------
    - name: Coletar Facts de Interfaces (Cisco IOS)
      cisco.ios.ios_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['ios', 'cisco.ios.ios']

    - name: Coletar Facts de Interfaces (Huawei CE/VRP)
      community.network.ce_facts:
        gather_subset: interfaces
      when: ansible_network_os in ['ce', 'community.network.ce', 'huawei.vrp.vrp']

    # ---------------------------------------------------------
    # 2. PARSE E FILTRO EM MEMÓRIA (Otimização)
    # ---------------------------------------------------------
    - name: Extrair lista de interfaces do equipamento
      ansible.builtin.set_fact:
        # Extrai apenas as chaves (nomes das interfaces) do dicionário retornado
        device_interfaces: "{{ ansible_net_interfaces.keys() | list | sort }}"
      
    - name: Opcional - Filtrar apenas interfaces físicas (ignorar Vlans/Loopbacks)
      ansible.builtin.set_fact:
        physical_interfaces: "{{ device_interfaces | reject('search', 'Vlan|Loopback|Null') | list }}"

    # ---------------------------------------------------------
    # 3. MUTAÇÃO VIA API NO AAP (DELEGADO AO CONTROLLER)
    # ---------------------------------------------------------
    - name: Atualizar o Survey do Job de Execução (Job 2) via API
      awx.awx.job_template:
        name: "Job 2 - Execute L3 Provisioning" # O nome exato do seu Job de configuração
        survey_spec:
          name: "L3 Provisioning Survey"
          description: "Configuração de IP em interface L3"
          spec:
            # Reafirmamos o target_hostname para o Job 2 saber onde agir, 
            # transformando-o num campo default read-only ou de confirmação
            - question_name: "Equipamento Alvo"
              question_description: "Equipamento preparado pelo Estágio 1"
              variable: "target_hostname"
              type: "text"
              default: "{{ inventory_hostname }}"
              required: true
            
            # O pulo do gato: o dropdown injetado em tempo real
            - question_name: "Selecione a Interface"
              question_description: "Interfaces físicas disponíveis no {{ inventory_hostname }}"
              variable: "target_interface"
              type: "multiplechoice"
              choices: "{{ physical_interfaces | join('\n') }}"
              required: true
            
            - question_name: "Endereço IPv4 (CIDR)"
              question_description: "Ex: 192.168.10.1/30"
              variable: "target_ip_cidr"
              type: "text"
              required: true
      # Rodamos a mutação da API a partir do próprio servidor Ansible, não do Router
      delegate_to: localhost
      run_once: yes
      # Configuração direta para a API do AAP (com fallback seguro para execução via CLI)
      controller_host: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://192.168.15.200', true) }}"
      controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
      controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default('redhat', true) }}"
      validate_certs: no
