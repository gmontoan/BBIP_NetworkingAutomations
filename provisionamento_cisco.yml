---
- name: Configuração de Dispositivos Cisco IOS
  hosts: all
  gather_facts: no
  tasks:
    - name: Configurar Hostname
      cisco.ios.ios_hostname:
        name: "{{ inventory_hostname }}"

    - name: Configurar Endereço IP na Interface
      cisco.ios.ios_l3_interfaces:
        config:
          - name: "{{ interface_name | default('GigabitEthernet1') }}"
            ipv4:
              - address: "{{ ipv4_address }}"
        state: merged

    - name: Garantir Configurações de Acesso Remoto (VTY)
      cisco.ios.ios_config:
        parents: line vty 0 4
        lines:
          - login local
          - transport input ssh
