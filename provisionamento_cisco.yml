---
- name: Provisionamento Cisco com Usuário Ansible
  hosts: all
  # Desabilitamos a coleta automática para evitar o erro de banner SSH
  gather_facts: no
  
  tasks:
    - name: Abortar se não for grupo Cisco
      ansible.builtin.meta: end_host
      when: target_group != "cisco_routers"

    - name: Criar Usuário Ansible com Privilégio 15
      cisco.ios.ios_user:
        name: ansible
        privilege: 15
        # Corrigido de 'password' para 'configured_password'
        configured_password: redhat
        state: present

    - name: Configurar Hostname
      cisco.ios.ios_hostname:
        name: "{{ target_hostname }}"

    - name: Configurar IP na Interface Física
      cisco.ios.ios_l3_interfaces:
        config:
          - name: "{{ physical_interface }}"
            ipv4:
              - address: "{{ ipv4_address }}"
        state: merged

    - name: Garantir Acesso VTY com Login Local
      cisco.ios.ios_config:
        parents: line vty 0 4
        lines:
          - login local
          - transport input ssh
