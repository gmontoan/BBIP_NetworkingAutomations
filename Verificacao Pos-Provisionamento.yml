---
- name: Verificação Pós-Provisionamento (Post-Check)
  hosts: "{{ target_hostname }}"
  gather_facts: no
  become: yes
  become_method: enable

  tasks:
    # ==========================================
    # BLOCO CISCO IOS
    # ==========================================
    - name: Executar comandos de validação (Cisco)
      cisco.ios.ios_command:
        commands:
          - show version
          - show ip interface brief
          - show ip ospf neighbor
          - show ip bgp summary
          - show running-config
      register: cisco_output
      when: target_group == "cisco_routers"

    - name: Exibir Relatório de Validação (Cisco)
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - " RELATÓRIO DE VALIDAÇÃO - CISCO IOS "
          - "=========================================="
          - ">>> SHOW IP INTERFACE BRIEF <<<"
          - "{{ cisco_output.stdout[1] }}"
          - ">>> SHOW IP OSPF NEIGHBOR <<<"
          - "{{ cisco_output.stdout[2] }}"
          - ">>> SHOW IP BGP SUMMARY <<<"
          - "{{ cisco_output.stdout[3] }}"
      when: target_group == "cisco_routers"

    # ==========================================
    # BLOCO ARISTA EOS
    # ==========================================
    - name: Executar comandos de validação (Arista)
      arista.eos.eos_command:
        commands:
          - show version
          - show ip interface brief
          - show ip ospf neighbor
          - show ip bgp summary
          - show running-config
      register: arista_output
      when: target_group == "arista_switches"

    - name: Exibir Relatório de Validação (Arista)
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - " RELATÓRIO DE VALIDAÇÃO - ARISTA EOS "
          - "=========================================="
          - ">>> SHOW IP INTERFACE BRIEF <<<"
          - "{{ arista_output.stdout[1] }}"
          - ">>> SHOW IP OSPF NEIGHBOR <<<"
          - "{{ arista_output.stdout[2] }}"
          - ">>> SHOW IP BGP SUMMARY <<<"
          - "{{ arista_output.stdout[3] }}"
      when: target_group == "arista_switches"
